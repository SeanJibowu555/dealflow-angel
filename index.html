<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealFlow Angel</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121923;
      --panel-2: #182230;
      --text: #e8eef5;
      --muted: #9fb0c3;
      --accent: #6ee7b7;
      --accent-2: #60a5fa;
      --danger: #f87171;
      --warn: #fbbf24;
      --ok: #34d399;
      --border: #253244;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui;
      background: linear-gradient(180deg, #0b0f14 0%, #0f1722 100%);
      color: var(--text);
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .pill {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .stage-declined { background: rgba(248,113,113,.12); color: #fca5a5; }

    .risk-healthy { background: rgba(52,211,153,.12); color: #86efac; }
    .risk-followup { background: rgba(251,191,36,.12); color: #fcd34d; }

    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 10px; border-bottom: 1px solid #253244; }

  </style>
</head>
<body>
<div class="container">
<h1>DealFlow Angel</h1>

<select id="stageFilter">
  <option value="All">All</option>
  <option value="Lead">Lead</option>
  <option value="Proposal">Proposal</option>
  <option value="Approval">Approval</option>
  <option value="Payout">Payout</option>
  <option value="Declined">Declined</option>
</select>

<table>
<thead>
<tr>
<th>Dealer</th>
<th>Customer</th>
<th>Stage</th>
<th>Outcome</th>
<th>Risk</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
function getRiskStatus(deal) {
  const stage = (deal.Stage || "").toLowerCase();
  const outcome = (deal.Outcome || "").toLowerCase();

  if (stage === "declined") {
    if (outcome === "follow-up") return "Needs follow-up";
    if (outcome === "dead") return "Healthy";
  }

  return "Healthy";
}

function render(deals){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = deals.map(d=>{
    const risk = getRiskStatus(d);
    return `
    <tr>
      <td>${d.Dealer}</td>
      <td>${d.Customer}</td>
      <td><span class="pill stage-declined">${d.Stage}</span></td>
      <td>${d.Outcome || "-"}</td>
      <td><span class="pill ${risk === "Healthy" ? "risk-healthy" : "risk-followup"}">${risk}</span></td>
    </tr>
    `;
  }).join("");
}

// dummy example
render([
  {Dealer:"Test Motors", Customer:"John", Stage:"Declined", Outcome:"Follow-up"},
  {Dealer:"AutoHub", Customer:"Jane", Stage:"Declined", Outcome:"Dead"}
]);
</script>

</body>
</html>
